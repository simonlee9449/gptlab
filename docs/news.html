<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GPT Lab - News</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600;700&family=Noto+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

  <nav>
    <div class="nav-inner">
      <a href="index.html" class="nav-logo">
        <div class="nav-logo-mark"><svg viewBox="0 0 24 24" fill="none"><path d="M12 3C10.5 7 7 8.5 3 9c4 1.5 6.5 4 7 8 .5-4 3.5-6 8-7-4.5-1.5-6-4.5-6-7z" fill="white"/></svg></div>
        <span class="nav-logo-text">GPT Lab</span>
      </a>
      <ul class="nav-links">
        <li><a href="index.html">Home</a></li>
        <li><a href="people.html">People</a></li>
        <li><a href="publications.html">Publications</a></li>
        <li><a href="news.html">News</a></li>
      </ul>
    </div>
  </nav>

  <div class="page-hero">
    <div class="page-hero-left">
      <div class="label">News</div>
      <h1>Lab News</h1>
      <p class="note">Updates and announcements from GPT Lab</p>
    </div>
    <button class="btn-add" onclick="openAddModal()">+ Add News</button>
  </div>

  <div class="news-section">
    <div id="news-container">
      <div class="loading">Loading news...</div>
    </div>
  </div>

  <!-- Add/Edit Modal -->
  <div class="modal-overlay" id="newsModal">
    <div class="modal">
      <h2 id="modalTitle">Add News</h2>
      <form id="newsForm">
        <input type="hidden" id="newsId">
        <div class="form-group">
          <label>Title *</label>
          <input type="text" id="newsTitle" required placeholder="News title">
        </div>
        <div class="form-group">
          <label>Description *</label>
          <textarea id="newsDescription" required placeholder="Write news description here..."></textarea>
        </div>
        <div class="form-group">
          <label>Image URL (Optional)</label>
          <input type="url" id="newsImageUrl" placeholder="https://...">
          <p class="form-hint">Enter a direct image URL</p>
        </div>
        <div class="form-group">
          <label>Date</label>
          <input type="date" id="newsDate">
        </div>
        <div class="modal-actions">
          <button type="button" class="btn-cancel" onclick="closeModal()">Cancel</button>
          <button type="submit" class="btn-save">Save</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Password Modal -->
  <div class="modal-overlay password-modal" id="passwordModal">
    <div class="modal">
      <h2>Enter Password</h2>
      <div class="form-group">
        <input type="password" id="passwordInput" placeholder="Password">
      </div>
      <div class="modal-actions" style="justify-content:center;">
        <button class="btn-cancel" onclick="closePasswordModal()">Cancel</button>
        <button class="btn-save" onclick="verifyPassword()">Confirm</button>
      </div>
    </div>
  </div>

  <footer>
    <div class="footer-inner">
      <div class="footer-info">
        <p>Sungkyunkwan University, SAIHST &amp; Samsung Medical Center<br>81, Irwon-ro, Gangnam-gu, Seoul</p>
      </div>
      <div class="footer-logos">
        <span class="footer-badge">SKKU</span>
        <span class="footer-badge">SAIHST</span>
        <span class="footer-badge">SMC</span>
      </div>
    </div>
  </footer>

  <script src="js/app.js"></script>
  <script>
    var newsItems = [];
    var pendingAction = null;
    var editingId = null;

    async function loadNews() {
      newsItems = await fetchSheetData('News');
      // 날짜순 정렬 (최신순)
      newsItems.sort(function(a, b) {
        return new Date(b.date) - new Date(a.date);
      });
      renderNews();
    }

    function renderNews() {
      var container = document.getElementById('news-container');

      if (!newsItems || newsItems.length === 0) {
        container.innerHTML = '<div class="loading">No news yet.</div>';
        return;
      }

      var html = '<div class="news-grid">';
      for (var i = 0; i < newsItems.length; i++) {
        var item = newsItems[i];
        html += '<div class="news-card">' +
          '<div class="news-card-content">' +
            (item.imageUrl ? '<img src="' + convertDriveUrl(item.imageUrl) + '" alt="" class="news-card-image">' : '') +
            '<div class="news-card-text">' +
              '<h3>' + escapeHtml(item.title) + '</h3>' +
              '<p>' + escapeHtml(item.description) + '</p>' +
              '<div class="date">' + (item.date || '') + '</div>' +
            '</div>' +
          '</div>' +
          '<div class="news-actions">' +
            '<button class="btn-edit" onclick="editNews(' + item.id + ')">Edit</button>' +
            '<button class="btn-delete" onclick="deleteNews(' + item.id + ')">Delete</button>' +
          '</div>' +
        '</div>';
      }
      html += '</div>';

      container.innerHTML = html;
    }

    function openAddModal() {
      editingId = null;
      document.getElementById('modalTitle').textContent = 'Add News';
      document.getElementById('newsForm').reset();
      document.getElementById('newsDate').value = new Date().toISOString().split('T')[0];
      document.getElementById('newsModal').classList.add('active');
    }

    function closeModal() {
      document.getElementById('newsModal').classList.remove('active');
    }

    function editNews(id) {
      var item = newsItems.find(function(n) { return n.id == id; });
      if (!item) return;

      editingId = id;
      document.getElementById('modalTitle').textContent = 'Edit News';
      document.getElementById('newsTitle').value = item.title;
      document.getElementById('newsDescription').value = item.description;
      document.getElementById('newsImageUrl').value = item.imageUrl || '';
      document.getElementById('newsDate').value = item.date || '';
      document.getElementById('newsModal').classList.add('active');
    }

    function deleteNews(id) {
      if (!confirm('Are you sure you want to delete this news?')) return;
      pendingAction = { type: 'deleteNews', id: id };
      document.getElementById('passwordModal').classList.add('active');
      document.getElementById('passwordInput').value = '';
      document.getElementById('passwordInput').focus();
    }

    document.getElementById('newsForm').addEventListener('submit', function(e) {
      e.preventDefault();

      var newsData = {
        id: editingId,
        title: document.getElementById('newsTitle').value,
        description: document.getElementById('newsDescription').value,
        imageUrl: document.getElementById('newsImageUrl').value,
        date: document.getElementById('newsDate').value
      };

      pendingAction = {
        type: editingId ? 'updateNews' : 'addNews',
        data: newsData
      };
      document.getElementById('passwordModal').classList.add('active');
      document.getElementById('passwordInput').value = '';
      document.getElementById('passwordInput').focus();
    });

    function closePasswordModal() {
      document.getElementById('passwordModal').classList.remove('active');
      pendingAction = null;
    }

    async function verifyPassword() {
      var password = document.getElementById('passwordInput').value;

      if (password !== '3820') {
        alert('Incorrect password');
        document.getElementById('passwordInput').value = '';
        document.getElementById('passwordInput').focus();
        return;
      }

      if (!pendingAction) return;

      var btn = document.querySelector('#passwordModal .btn-save');
      btn.disabled = true;
      btn.textContent = 'Processing...';

      var result = await callAppsScript(pendingAction.type, pendingAction.data || { id: pendingAction.id }, password);

      btn.disabled = false;
      btn.textContent = 'Confirm';

      if (result.success) {
        closePasswordModal();
        closeModal();
        pendingAction = null;
        alert('Changes saved! Refreshing data...');
        setTimeout(function() {
          loadNews();
        }, 2000);
      } else {
        alert(result.message || 'An error occurred');
      }
    }

    document.getElementById('passwordInput').addEventListener('keypress', function(e) {
      if (e.key === 'Enter') verifyPassword();
    });

    loadNews();
  </script>
</body>
</html>
